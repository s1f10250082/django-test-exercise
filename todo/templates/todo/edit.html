{% load static %}
<!DOCTYPE html>
<html lang="ja">

  <head>
    <title>To Do Application</title>
    <meta charset="UTF-8">
    <meta name="author" content="INIAD">
    <link rel="stylesheet" href="{% static 'todo/css/edit.css' %}?v=2">
  </head>

  <body>
    <div class="container">
      <h1>タスクを編集</h1>
      <form action="{% url 'edit' task.id %}" method="post">
        {% csrf_token %}
        <div class="form-group">
          <label for="titleInput">タイトル</label>
          <input id="titleInput" name="title" type="text" value="{{ task.title }}">
        </div>
        <div class="form-group">
          <label for="dueInput">期限</label>
          <input id="dueInput" name="due_at" type="datetime-local" value="{{ task.due_at|date:'Y-m-d\TH:i' }}">
        </div>
        <div class="form-group checkbox-group">
          <label for="completedInput">
            <input id="completedInput" name="completed" type="checkbox" {% if task.completed %}checked{% endif %}>
            完了済みにする
          </label>
        </div>
        <div class="form-actions">
          <button type="submit">保存</button>
        </div>
      </form>

      <div class="actions">
        <a href="{% url 'detail' task.id %}">詳細に戻る</a>
      </div>
    </div>
  </body>

</html>
